name: Fleet Manager CI

on:
  push:
    branches:
      - main
      - develop
      - feature/**
  pull_request:
    branches:
      - main
      - develop

jobs:

  test-backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: fleet_user
          POSTGRES_PASSWORD: fleet_password
          POSTGRES_DB: fleet_test_db
        ports:
          - 5432:5432

        options: >-
          --health-cmd="pg_isready -U fleet_user"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql+psycopg2://fleet_user:fleet_password@localhost:5432/fleet_test_db
      SECRET_KEY: testsecret
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30

    defaults:
      run:
        working-directory: backend

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        run: |
          alembic upgrade head

      - name: Run tests
        run: |
          pytest -v

      - name: Check formatting
        run: |
          pip install black
          black --check .

      - name: Lint
        run: |
          pip install flake8
          flake8 .